<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Compressor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Prompt Compressor</h1>
          <p>Codex向けプロンプト圧縮</p>
        </div>
        <div class="status-pill" id="runtimeStatus">待機中</div>
      </header>

      <section class="primary-flow" aria-label="Compression workspace">
        <div class="input-card">
          <div class="section-head">
            <div>
              <h2>圧縮予定の文</h2>
              <p id="settingsSummary">Standard / Codex optimized / Coding / Level 2</p>
            </div>
            <div class="head-actions">
              <button class="secondary" id="sampleButton" type="button">サンプル</button>
              <button id="compressButton" type="button">圧縮する</button>
            </div>
          </div>
          <textarea
            id="promptInput"
            spellcheck="false"
            placeholder="ここに圧縮したい依頼文を入れてください。"
          ></textarea>
        </div>
      </section>

      <details class="settings-panel">
        <summary>
          <span>設定</span>
          <small>モデル、モード、タスク種別、圧縮レベル</small>
        </summary>
        <div class="settings-grid" aria-label="Compression settings">
          <label>
            モデル
            <select id="profileSelect"></select>
          </label>
          <label>
            モード
            <select id="modeSelect">
              <option value="codex_optimized">Codex optimized</option>
              <option value="developer_mode">Developer mode</option>
              <option value="instruction_extract">Instruction extract</option>
              <option value="lossless">Lossless</option>
              <option value="privacy_redaction">Privacy redaction</option>
            </select>
          </label>
          <label>
            タスク種別
            <select id="taskSelect">
              <option value="coding">Coding</option>
              <option value="log_analysis">Log analysis</option>
              <option value="refactor">Refactor</option>
              <option value="design_discussion">Design discussion</option>
              <option value="general">General</option>
            </select>
          </label>
          <label class="level-control">
            圧縮レベル <span id="levelValue">2</span>
            <input id="levelInput" type="range" min="0" max="4" value="2" />
          </label>
        </div>
      </details>

      <section class="output-grid" aria-label="Compression result">
        <div class="output-card">
          <div class="section-head">
            <h2>圧縮結果</h2>
            <button class="secondary" id="copyButton" type="button">コピー</button>
          </div>
          <textarea id="promptOutput" spellcheck="false" readonly></textarea>
        </div>

        <aside class="result-panel">
          <div class="metric-grid">
            <div class="metric">
              <span>入力</span>
              <strong id="inputTokens">-</strong>
            </div>
            <div class="metric">
              <span>出力</span>
              <strong id="outputTokens">-</strong>
            </div>
            <div class="metric">
              <span>比率</span>
              <strong id="ratioValue">-</strong>
            </div>
            <div class="metric">
              <span>原文推奨</span>
              <strong id="fallbackValue">-</strong>
            </div>
          </div>

          <div class="result-lists">
            <section>
              <h3>保持条件</h3>
              <ul id="preservedList"></ul>
            </section>
            <section>
              <h3>リスク</h3>
              <ul id="riskList"></ul>
            </section>
            <section>
              <h3>削除内容</h3>
              <ul id="removedList"></ul>
            </section>
          </div>
        </aside>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
