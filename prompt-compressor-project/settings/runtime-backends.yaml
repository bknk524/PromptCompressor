schema_version: 1

runtimes:
  llama_cpp_default:
    backend: llama.cpp
    executable_path: local-runtime-binaries/llama-cli
    threads: auto
    gpu_layers: 0
    timeout_ms: 12000

  lmstudio_default:
    backend: lmstudio
    base_url: http://localhost:1234/v1
    api_token_env: LM_STUDIO_API_TOKEN
    timeout_ms: 30000
