<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Compressor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="window-chrome" id="windowChrome">
      <div class="window-chrome-drag" id="windowDragRegion" aria-hidden="true"></div>
      <div class="window-controls">
        <button
          class="window-control"
          id="windowMinimizeButton"
          type="button"
          aria-label="最小化"
          title="最小化"
        >
          <span class="window-glyph window-glyph-minimize" aria-hidden="true"></span>
        </button>
        <button
          class="window-control"
          id="windowMaximizeButton"
          type="button"
          aria-label="最大化"
          title="最大化"
        >
          <span class="window-glyph window-glyph-maximize" aria-hidden="true"></span>
        </button>
        <button
          class="window-control window-control-close"
          id="windowCloseButton"
          type="button"
          aria-label="閉じる"
          title="閉じる"
        >
          <span class="window-glyph window-glyph-close" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Prompt Compressor</h1>
        </div>
        <div class="topbar-actions">
          <div class="status-group" aria-label="状態">
            <div class="status-pill" id="modelStatus" aria-live="polite">モデル: 待機中</div>
            <div class="status-pill" id="workStatus" aria-live="polite">作業: 入力待ち</div>
          </div>
          <button
            class="icon-button settings-trigger"
            id="settingsButton"
            type="button"
            aria-label="設定を開く"
            aria-expanded="false"
            aria-controls="settingsMenu"
            title="設定"
          >
            <span aria-hidden="true">⚙</span>
          </button>
          <div class="settings-menu" id="settingsMenu" hidden>
            <div class="settings-menu-head">
              <h2>設定</h2>
              <p>モデル、表示、圧縮強度</p>
            </div>
            <div class="settings-grid" aria-label="Compression settings">
              <label>
                モデル
                <select id="profileSelect"></select>
              </label>
              <label class="theme-setting" for="themeToggle">
                表示
                <span class="theme-toggle">
                  <span>ブラックモード</span>
                  <input id="themeToggle" type="checkbox" role="switch" />
                </span>
              </label>
              <label class="level-control" for="levelInput">
                <span class="level-label-row">
                  <span>圧縮レベル</span>
                  <strong id="levelValue">2</strong>
                </span>
                <input id="levelInput" type="range" min="1" max="3" value="2" />
                <span class="level-help" id="levelHelp">2 標準: 要件を保ちながら短く圧縮</span>
                <span class="level-scale" aria-hidden="true">
                  <span>1 控えめ</span>
                  <span>2 標準</span>
                  <span>3 強め</span>
                </span>
              </label>
            </div>
          </div>
        </div>
      </header>

      <section class="model-setup" id="modelSetup" aria-live="polite" hidden>
        <div class="model-setup-copy">
          <strong id="modelSetupTitle">ローカルモデルの取得が必要です</strong>
          <span id="modelSetupDetail"></span>
          <progress id="modelDownloadProgress" max="100" value="0" hidden></progress>
        </div>
        <div class="model-setup-actions">
          <button class="secondary" id="modelCancelButton" type="button" hidden>中止</button>
          <button id="modelInstallButton" type="button">モデルを取得</button>
        </div>
      </section>

      <div class="workspace-grid">
        <section class="primary-flow" aria-label="Compression workspace">
          <div class="input-card">
            <div class="section-head">
              <div>
                <h2>圧縮予定の文</h2>
                <p id="settingsSummary">Standard / Level 2 標準</p>
              </div>
              <div class="head-actions">
                <select class="sample-select" id="sampleSelect" aria-label="サンプル文章">
                  <option value="">サンプルを選択</option>
                  <option value="search">検索条件と URL</option>
                  <option value="bugfix">API のバグ修正</option>
                  <option value="tests">テスト追加</option>
                  <option value="refactor">コンポーネント整理</option>
                  <option value="logs">障害ログ解析</option>
                  <option value="design">設計検討</option>
                </select>
                <button class="secondary" id="clearInputButton" type="button">クリア</button>
                <button id="compressButton" type="button">圧縮する</button>
              </div>
            </div>
            <textarea
              id="promptInput"
              spellcheck="false"
              placeholder="ここに圧縮したい依頼文を入れてください。"
            ></textarea>
          </div>
        </section>

        <section class="output-grid" aria-label="Compression result">
          <div class="output-card">
            <div class="section-head">
              <div class="result-title-row">
                <h2>圧縮結果</h2>
                <span class="result-latency" id="compressionLatency"></span>
              </div>
              <button class="secondary" id="copyButton" type="button">コピー</button>
            </div>
            <div class="result-notice" id="resultNotice" role="status" hidden>
              <strong>圧縮結果を採用できませんでした。原文を表示しています。</strong>
              <span id="resultNoticeDetail">自動コピーは行っていません。</span>
            </div>
            <textarea id="promptOutput" spellcheck="false" readonly></textarea>
          </div>

          <aside class="result-panel">
            <div class="metric-grid">
              <div class="metric">
                <span>トークン（推定）</span>
                <strong id="tokenComparison">-</strong>
                <small id="tokenRatioValue">-</small>
              </div>
              <div class="metric">
                <span>文字数</span>
                <strong id="characterComparison">-</strong>
                <small id="characterRatioValue">-</small>
              </div>
              <div class="metric metric-fallback">
                <span>原文推奨</span>
                <strong id="fallbackValue">-</strong>
              </div>
            </div>
          </aside>
        </section>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
