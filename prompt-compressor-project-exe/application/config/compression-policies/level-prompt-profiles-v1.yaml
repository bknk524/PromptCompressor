schema_version: 1
id: level-prompt-profiles-v1

# Each profile inherits this baseline. The selected profile is sent to the
# model in one request; the application does not run a second derivation pass.
shared_instruction: "要件・制約・禁止を残し、原文にない内容は追加しない。"

profiles:
  level_1_reference:
    level: 1
    target_ratio: "85%以下"
    instruction: "重複表現だけを削り、原文の順序を優先する。"
    format_instruction: "簡潔な本文だけを返す。"
    allow_semantic_shortening: false
  level_2_balanced:
    level: 2
    target_ratio: "70%以下"
    instruction: "敬語、背景、重複を削り、短い節にする。"
    format_instruction: "短い節をセミコロンでつなぎ、説明文は書かない。"
    allow_semantic_shortening: false
  level_3_aggressive:
    level: 3
    target_ratio: "55%以下"
    instruction: "同じ対象の保持条件を統合し、必須語、数値、禁止・制限だけを残す。自然言語は意味を保つより短い同義表現へ言い換えてよい。"
    format_instruction: "「Xを押したときだけYを実行」は「X時のみY」、「Xは避ける」は「X禁止」のように短縮し、統合した最短の節をセミコロンでつなぐ。"
    allow_semantic_shortening: true
