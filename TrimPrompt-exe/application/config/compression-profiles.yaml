schema_version: 1
default_profile: internal_llm

profiles:
  internal_llm:
    label: アプリ内モデル（Sarashina 2.2 3B）
    selectable: true
    model_ref: sarashina_2_2_3b_instruct_q4_k_s
    policy_ref: balanced-codex-compression-policy-v1
    runtime_ref: llama_cpp_embedded
    fallback_profile: internal_llm
    target_tokenizer_profile: codex_default

  lmstudio_local:
    label: LM Studio（ローカルモデル自由選択）
    selectable: true
    model_ref: lmstudio_local_model
    policy_ref: balanced-codex-compression-policy-v1
    runtime_ref: lmstudio_external
    fallback_profile: lmstudio_local
    target_tokenizer_profile: codex_default
