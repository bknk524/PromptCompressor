schema_version: 1
id: level-prompt-profiles-v1

# Each profile inherits this baseline. The selected profile is sent to the
# model in one request; the application does not run a second derivation pass.
shared_instruction: "削除可=挨拶/現状説明/背景/敬語/重複/明白ノイズ。保持=対象/操作契機/条件と結果/例外/数値/必須語/禁止/維持/検証。必須語は表記を変えず対象と同じ節に各1回置き、同義語化/単独ラベル/末尾追記禁止。限定語(だけ/のみ/以外)、否定語(しない/せず/禁止)、条件語(なら/場合/とき)は削除・弱化せず、対象と結果を同じ節に残す。異なる条件と結果を統合せず、否定を反転しない。日時/ID/URL/ファイル名/エラー表記/識別子は改変禁止。原文外追加/意味変更/個別ケース暗記は禁止。"

profiles:
  level_1_reference:
    level: 1
    target_ratio: "75〜90%"
    instruction: "短くしすぎない。重複だけ削り、語順と表現を優先。"
    format_instruction: "1〜3文。助詞と必要な説明は残す。"
    allow_semantic_shortening: false
  level_2_balanced:
    level: 2
    target_ratio: "通常40〜65%、雑入力50〜75%"
    instruction: "[対象]→[要求]→[制約]→[検証]を原文順に各1回短縮。概要追加禁止。制約対象名は列挙も全て残し、述語/助詞だけ短縮。条件→結果は一対一、限定/禁止対象を混同せず、手段と目的を結び替えない。必須語は逐字使用。誤字は原文内で正解が確定する場合だけ補正。"
    format_instruction: "2〜5文の1段落。対象と動作から始め、制約を独立節で続ける。条件欠落/対象不明/再要約/ラベル列挙/原文断片追記は禁止。実装とテストを判断できる密度を保ち、ケース固有暗記は禁止。"
    allow_semantic_shortening: false
  level_3_aggressive:
    level: 3
    target_ratio: "50%以下"
    instruction: "名詞句中心、短い同義語可。列挙は / 。説明語/見出し/重複禁止。制約は変更しない/維持/のみ/禁止など短語で残す。"
    format_instruction: "1文45〜80字目安。してください/追加/検証/含める等の指示語、助詞、敬語を削る。"
    allow_semantic_shortening: true
